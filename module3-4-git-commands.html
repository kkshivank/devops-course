<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Git Commands | Module 3</title>
<style>
  :root{--bg:#0b0e20;--card:#1a2143;--ink:#eef1ff;--muted:#9aa3d0;--p1:#7c5cff;--p2:#00d4ff;--p3:#ff5da2;--p4:#ffb340;--p5:#28e0a8;--line:rgba(255,255,255,.09)}
  *{box-sizing:border-box;margin:0;padding:0}html,body{height:100%}
  body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);overflow:hidden;display:flex;flex-direction:column;height:100vh;height:100dvh}
  .bg{position:fixed;inset:0;z-index:-2;background:radial-gradient(900px 500px at 12% -8%,rgba(124,92,255,.28),transparent),radial-gradient(800px 460px at 100% 0%,rgba(0,212,255,.22),transparent),radial-gradient(700px 500px at 50% 120%,rgba(255,93,162,.18),transparent),var(--bg)}
  .stars{position:fixed;inset:0;z-index:-1;overflow:hidden;opacity:.5}.stars i{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;animation:tw 4s ease-in-out infinite}
  svg .ic{stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .top{display:flex;align-items:center;gap:12px;padding:16px 24px;flex-wrap:wrap}
  .chip{display:inline-flex;align-items:center;gap:8px;background:rgba(124,92,255,.16);border:1px solid rgba(124,92,255,.4);color:#c9bcff;padding:5px 14px;border-radius:100px;font-size:12px;font-weight:700;letter-spacing:1px}
  .chip svg{width:14px;height:14px}.top .t{font-size:15px;color:var(--muted);min-width:0}.top .t b{color:var(--ink)}
  .stage-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:6px 20px;min-height:0}
  .stage{position:relative;width:100%;max-width:900px;aspect-ratio:16/9;max-height:100%;background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(0,0,0,.12));border:1px solid var(--line);border-radius:20px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.5)}
  .scene{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:18px;opacity:0;transform:scale(1.03);pointer-events:none;transition:opacity .7s ease,transform .7s ease}
  .scene.active{opacity:1;transform:none;pointer-events:auto}.no-js .scene{position:relative;opacity:1;transform:none;border-bottom:1px solid var(--line)}
  .scene h2{font-size:clamp(20px,3vw,28px);margin-top:8px}
  .scene .art{width:100%;max-width:600px;flex:1;display:flex;align-items:center;justify-content:center}.scene .art svg{width:100%;height:100%;max-height:330px}
  .caption{display:flex;align-items:center;gap:12px;justify-content:center;padding:2px 24px 4px;min-height:56px}
  .navatar{width:38px;height:38px;flex-shrink:0}.navatar .eye{transform-box:fill-box;transform-origin:center;animation:blink 4s infinite}
  .ctext{background:rgba(0,0,0,.35);border:1px solid var(--line);border-radius:12px;padding:9px 16px;font-size:15px;max-width:760px;transition:opacity .35s ease}.ctext.swap{opacity:0}
  .controls{padding:8px 24px 18px;padding-bottom:max(18px,env(safe-area-inset-bottom))}.bar{max-width:900px;margin:0 auto}
  .timeline{display:flex;gap:5px;margin-bottom:12px}.seg{flex:1;height:6px;border-radius:5px;background:rgba(255,255,255,.12);overflow:hidden;cursor:pointer}
  .seg .fill{height:100%;width:0;background:linear-gradient(90deg,var(--p1),var(--p2))}.seg.done .fill{width:100%}
  .btns{display:flex;align-items:center;justify-content:center;gap:12px}
  button{font-family:inherit;cursor:pointer;border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:12px;padding:10px 15px;display:inline-flex;align-items:center;gap:8px;font-size:14px;font-weight:600;transition:background .2s ease,transform .1s ease}
  button:hover{background:#232a52}button:active{transform:scale(.95)}button svg{width:18px;height:18px}
  .play{background:linear-gradient(90deg,var(--p1),var(--p2));border:none;color:#08122a;padding:11px 22px}
  .lbl{min-width:150px;text-align:center;color:var(--muted);font-size:13px;font-weight:600}
  @keyframes tw{0%,100%{opacity:.15}50%{opacity:.9}}
  @keyframes blink{0%,92%,100%{transform:scaleY(1)}95%{transform:scaleY(.1)}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
  @keyframes pop{0%{opacity:0;transform:scale(.55)}70%{transform:scale(1.1)}100%{opacity:1;transform:scale(1)}}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
  @keyframes glowp{0%,100%{opacity:.25;transform:scale(1)}50%{opacity:.55;transform:scale(1.12)}}
  @keyframes caret{0%,100%{opacity:1}50%{opacity:0}}
  .scene.active .u0{animation:fadeUp .7s .15s ease both}.scene.active .u1{animation:fadeUp .7s 1.1s ease both}
  .scene.active .bob{animation:bob 3s ease-in-out infinite}
  .scene.active .r0{animation:pop .5s .2s ease both}.scene.active .r1{animation:pop .5s .5s ease both}.scene.active .r2{animation:pop .5s .8s ease both}.scene.active .r3{animation:pop .5s 1.1s ease both}.scene.active .r4{animation:pop .5s 1.4s ease both}.scene.active .r5{animation:pop .5s 1.7s ease both}
  .scene.active .caret{animation:caret 1s step-end infinite}
  .glow{transform-origin:center;animation:glowp 2.6s ease-in-out infinite}
  @media(max-width:820px){body{height:auto;min-height:100dvh;overflow-x:hidden;overflow-y:auto}.stage-wrap{flex:none;padding:10px 14px}.stage{aspect-ratio:auto;height:auto;min-height:0;max-height:none}.scene{position:relative;inset:auto;display:none;transform:none;min-height:52vh}.scene.active{display:flex}.scene h2{font-size:20px}.scene .art svg{max-height:250px}}
  @media(max-width:640px){.top{padding:10px 14px;gap:8px}.top .t{font-size:13px}.stage-wrap{padding:4px 10px}.stage{border-radius:14px}.scene{padding:10px}.scene h2{font-size:18px}.scene .art svg{max-height:240px}.caption{padding:2px 12px;min-height:44px}.ctext{padding:8px 12px}.controls{padding:6px 12px 12px;padding-bottom:max(12px,env(safe-area-inset-bottom))}.btns{gap:8px}button{padding:9px 12px;font-size:13px}.play{padding:10px 16px}.lbl{display:none}.timeline{gap:3px}}
  @media(max-width:400px){.btns{gap:6px}button svg{width:16px;height:16px}.play span{display:none}.play{padding:10px 14px}}
</style>
</head>
<body class="no-js">

<div class="top">

<div class="stage-wrap">
  <div class="stage" id="stage">

    <section class="scene active">

          <g class="bob" transform="translate(202,60)"><rect x="10" y="8" width="60" height="46" rx="16" fill="#6a4fee"/><rect x="17" y="16" width="46" height="30" rx="11" fill="#0e1330"/><circle class="eye" cx="30" cy="31" r="5" fill="#00d4ff"/><circle class="eye" cx="50" cy="31" r="5" fill="#00d4ff"/><path d="M32 39q8 6 16 0" stroke="#28e0a8" stroke-width="2.6" fill="none" stroke-linecap="round"/><line x1="40" y1="8" x2="40" y2="0" stroke="#00d4ff" stroke-width="3" stroke-linecap="round"/><circle cx="40" cy="-3" r="4" fill="#00d4ff" class="glow"/></g>
          <text class="u0" x="240" y="170" text-anchor="middle" font-size="26" font-weight="800" fill="#eef1ff">Git Commands</text>
          <text class="u0" x="240" y="196" text-anchor="middle" font-size="14" fill="#9aa3d0">The everyday commands, and what each one does</text>
        </svg>
      </div>

    </section>

    <section class="scene">
      <div class="art"><svg viewBox="0 0 480 240">
        <g class="r0"><rect x="60" y="70" width="360" height="100" rx="12" fill="#0e1330" stroke="var(--line)"/><circle cx="80" cy="90" r="4" fill="#ff5da2"/><circle cx="94" cy="90" r="4" fill="#ffb340"/><circle cx="108" cy="90" r="4" fill="#28e0a8"/>
          <text x="82" y="130" font-size="17" fill="#9fe8ff" font-family="monospace">$ git init</text><rect class="caret" x="205" y="118" width="9" height="17" fill="#9fe8ff"/></g>
        <text class="u1" x="240" y="200" text-anchor="middle" font-size="12" fill="#9aa3d0">Starts a brand-new Git repository inside your project folder</text>
      </svg></div>
      <h2>git init</h2>
    </section>

    <section class="scene">
      <div class="art"><svg viewBox="0 0 480 240">
        <g class="r0"><rect x="40" y="70" width="400" height="100" rx="12" fill="#0e1330" stroke="var(--line)"/><circle cx="60" cy="90" r="4" fill="#ff5da2"/><circle cx="74" cy="90" r="4" fill="#ffb340"/><circle cx="88" cy="90" r="4" fill="#28e0a8"/>
          <text x="62" y="130" font-size="16" fill="#9fe8ff" font-family="monospace">$ git clone &lt;url&gt;</text></g>
        <text class="u1" x="240" y="200" text-anchor="middle" font-size="12" fill="#9aa3d0">Copies an existing repository (e.g. from GitHub) onto your computer</text>
      </svg></div>
      <h2>git clone</h2>
    </section>

    <section class="scene">
      <div class="art"><svg viewBox="0 0 480 240">
        <g class="r0"><rect x="60" y="70" width="360" height="100" rx="12" fill="#0e1330" stroke="var(--line)"/><circle cx="80" cy="90" r="4" fill="#ff5da2"/><circle cx="94" cy="90" r="4" fill="#ffb340"/><circle cx="108" cy="90" r="4" fill="#28e0a8"/>
          <text x="82" y="130" font-size="16" fill="#9fe8ff" font-family="monospace">$ git add .</text></g>
        <text class="u1" x="240" y="200" text-anchor="middle" font-size="12" fill="#9aa3d0">Stages your changes — marks which files go into the next commit</text>
      </svg></div>
      <h2>git add</h2>
    </section>

    <section class="scene">
      <div class="art"><svg viewBox="0 0 480 240">
        <g class="r0"><rect x="30" y="70" width="420" height="100" rx="12" fill="#0e1330" stroke="var(--line)"/><circle cx="50" cy="90" r="4" fill="#ff5da2"/><circle cx="64" cy="90" r="4" fill="#ffb340"/><circle cx="78" cy="90" r="4" fill="#28e0a8"/>
          <text x="52" y="130" font-size="15" fill="#9fe8ff" font-family="monospace">$ git commit -m "msg"</text></g>
        <text class="u1" x="240" y="200" text-anchor="middle" font-size="12" fill="#9aa3d0">Saves the staged changes as a snapshot in your history, with a message</text>
      </svg></div>
      <h2>git commit</h2>
    </section>

    <section class="scene">
      <div class="art"><svg viewBox="0 0 480 240">
        <g class="r0"><rect x="26" y="46" width="200" height="60" rx="10" fill="#1a2143" stroke="#7c5cff"/><text x="126" y="82" text-anchor="middle" font-size="12" fill="#c9bcff">Your computer</text></g>
        <g class="r1"><rect x="254" y="46" width="200" height="60" rx="10" fill="#1a2143" stroke="#28e0a8"/><text x="354" y="82" text-anchor="middle" font-size="12" fill="#a3f5db">GitHub (server)</text></g>
        <g class="r2"><path d="M226 76 h28" stroke="#28e0a8" stroke-width="2.5"/><path d="M254 76l-8 -4 M254 76l-8 4" stroke="#28e0a8" stroke-width="2.5" fill="none"/><text x="240" y="66" text-anchor="middle" font-size="10" fill="#a3f5db">push</text></g>
        <g class="r3"><rect x="120" y="128" width="240" height="34" rx="9" fill="#0e1330" stroke="var(--line)"/><text x="240" y="150" text-anchor="middle" font-size="14" fill="#9fe8ff" font-family="monospace">$ git push</text></g>
        <text class="u1" x="240" y="198" text-anchor="middle" font-size="12" fill="#9aa3d0">Uploads your commits from your computer to the server (like GitHub)</text>
      </svg></div>
      <h2>git push</h2>
    </section>

    <section class="scene">
      <div class="art"><svg viewBox="0 0 480 240">
        <g class="r0"><rect x="26" y="46" width="200" height="60" rx="10" fill="#1a2143" stroke="#7c5cff"/><text x="126" y="82" text-anchor="middle" font-size="12" fill="#c9bcff">Your computer</text></g>
        <g class="r1"><rect x="254" y="46" width="200" height="60" rx="10" fill="#1a2143" stroke="#28e0a8"/><text x="354" y="82" text-anchor="middle" font-size="12" fill="#a3f5db">GitHub (server)</text></g>
        <g class="r2"><path d="M254 76 h-28" stroke="#00d4ff" stroke-width="2.5"/><path d="M226 76l8 -4 M226 76l8 4" stroke="#00d4ff" stroke-width="2.5" fill="none"/><text x="240" y="66" text-anchor="middle" font-size="10" fill="#9fe8ff">pull</text></g>
        <g class="r3"><rect x="120" y="128" width="240" height="34" rx="9" fill="#0e1330" stroke="var(--line)"/><text x="240" y="150" text-anchor="middle" font-size="14" fill="#9fe8ff" font-family="monospace">$ git pull</text></g>
        <text class="u1" x="240" y="198" text-anchor="middle" font-size="12" fill="#9aa3d0">Downloads the latest commits from the server to your computer</text>
      </svg></div>
      <h2>git pull</h2>
    </section>

    <section class="scene">
      <div class="art"><svg viewBox="0 0 480 240">
        <g class="r0"><rect x="40" y="40" width="400" height="26" rx="7" fill="#1a2143" stroke="#7c5cff"/><text x="60" y="58" font-size="12" fill="#eef1ff" font-family="monospace">git init / git clone</text><text x="300" y="58" font-size="11" fill="#9aa3d0">start a repo</text></g>
        <g class="r1"><rect x="40" y="74" width="400" height="26" rx="7" fill="#1a2143" stroke="#ffb340"/><text x="60" y="92" font-size="12" fill="#eef1ff" font-family="monospace">git add</text><text x="300" y="92" font-size="11" fill="#9aa3d0">stage changes</text></g>
        <g class="r2"><rect x="40" y="108" width="400" height="26" rx="7" fill="#1a2143" stroke="#28e0a8"/><text x="60" y="126" font-size="12" fill="#eef1ff" font-family="monospace">git commit</text><text x="300" y="126" font-size="11" fill="#9aa3d0">save snapshot</text></g>
        <g class="r3"><rect x="40" y="142" width="400" height="26" rx="7" fill="#1a2143" stroke="#00d4ff"/><text x="60" y="160" font-size="12" fill="#eef1ff" font-family="monospace">git push</text><text x="300" y="160" font-size="11" fill="#9aa3d0">send to server</text></g>
        <g class="r4"><rect x="40" y="176" width="400" height="26" rx="7" fill="#1a2143" stroke="#ff5da2"/><text x="60" y="194" font-size="12" fill="#eef1ff" font-family="monospace">git pull</text><text x="300" y="194" font-size="11" fill="#9aa3d0">get latest</text></g>
      </svg></div>
      <h2>The Everyday Cycle</h2>
    </section>

  </div>
</div>

<div class="caption">
  <svg class="navatar" viewBox="0 0 60 60"><rect x="14" y="16" width="32" height="26" rx="9" fill="#6a4fee"/><rect x="19" y="21" width="22" height="16" rx="6" fill="#0e1330"/><circle class="eye" cx="26" cy="29" r="3" fill="#00d4ff"/><circle class="eye" cx="34" cy="29" r="3" fill="#00d4ff"/><line x1="30" y1="16" x2="30" y2="10" stroke="#00d4ff" stroke-width="2.4" stroke-linecap="round"/><circle cx="30" cy="8" r="2.6" fill="#00d4ff"/></svg>
  <div class="ctext" id="ctext">Git Commands — the everyday commands and what each does.</div>
</div>

<div class="controls">
  <div class="bar">
    <div class="timeline" id="timeline"></div>
    <div class="btns">
      <button id="prev" aria-label="Previous"><svg class="ic" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></button>
      <button class="play" id="play"><svg class="ic" viewBox="0 0 24 24" id="playicon"><path d="M6 4h4v16H6zM14 4h4v16h-4z"/></svg><span id="playlabel">Pause</span></button>
      <button id="next" aria-label="Next"><svg class="ic" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg></button>
      <span class="lbl" id="chapterlabel">Intro</span>
    </div>
  </div>
</div>

<script>
document.body.classList.remove('no-js');
(function(){
  var sf=document.getElementById('stars'); var h='';
  for(var i=0;i<50;i++){h+='<i style="left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;animation-delay:'+(-Math.random()*4)+'s"></i>';}
  sf.innerHTML=h;
  var scenes=[].slice.call(document.querySelectorAll('.scene'));
  var names=['Intro','git init','git clone','git add','git commit','git push','git pull','The cycle'];
  var caps=[
    "Git Commands — the everyday commands and what each does.",
    "git init starts a brand-new Git repository inside your project folder.",
    "git clone copies an existing repository (for example from GitHub) onto your computer.",
    "git add stages your changes — it marks which files should go into the next commit.",
    "git commit saves the staged changes as a snapshot in your history, along with a message.",
    "git push uploads your commits from your computer to the server, like GitHub.",
    "git pull downloads the latest commits from the server back to your computer.",
    "The everyday cycle: init or clone, then add, commit, push — and pull to stay up to date."
  ];
  var durations=[5000,8000,8000,8000,8000,8500,8000,8000];
  var timeline=document.getElementById('timeline');
  scenes.forEach(function(_,i){ var d=document.createElement('div'); d.className='seg'; d.dataset.i=i; d.innerHTML='<div class="fill"></div>'; timeline.appendChild(d); });
  var segs=[].slice.call(document.querySelectorAll('.seg'));
  var cur=0, playing=true, start=0, raf=null, elapsed=0, ended=false;
  var playIcon=document.getElementById('playicon'), playLabel=document.getElementById('playlabel');
  var chapterLabel=document.getElementById('chapterlabel'), ctext=document.getElementById('ctext');
  var ICON_PAUSE='<path d="M6 4h4v16H6zM14 4h4v16h-4z"/>', ICON_PLAY='<path d="M6 4l14 8-14 8z"/>', ICON_REPLAY='<path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/>';
  function setScene(i){ cur=Math.max(0,Math.min(scenes.length-1,i));
    scenes.forEach(function(s,idx){ s.classList.toggle('active',idx===cur); });
    segs.forEach(function(s,idx){ s.classList.toggle('done',idx<cur); s.querySelector('.fill').style.width= idx<cur?'100%':'0%'; });
    chapterLabel.textContent=names[cur]; ctext.classList.add('swap');
    setTimeout(function(){ ctext.innerHTML=caps[cur]; ctext.classList.remove('swap'); },200);
    elapsed=0; start=performance.now(); }
  function tick(now){ if(!playing) return; elapsed=now-start; var p=Math.min(elapsed/durations[cur],1);
    segs[cur].querySelector('.fill').style.width=(p*100)+'%';
    if(p>=1){ if(cur>=scenes.length-1){ finish(); return; } setScene(cur+1); } raf=requestAnimationFrame(tick); }
  function play(){ if(ended){ ended=false; setScene(0); } playing=true; playIcon.innerHTML=ICON_PAUSE; playLabel.textContent='Pause'; start=performance.now()-elapsed; cancelAnimationFrame(raf); raf=requestAnimationFrame(tick); }
  function pause(){ playing=false; playIcon.innerHTML=ICON_PLAY; playLabel.textContent='Play'; cancelAnimationFrame(raf); }
  function finish(){ playing=false; ended=true; playIcon.innerHTML=ICON_REPLAY; playLabel.textContent='Replay'; cancelAnimationFrame(raf); }
  document.getElementById('play').addEventListener('click',function(){ ended?play():(playing?pause():play()); });
  document.getElementById('next').addEventListener('click',function(){ if(cur<scenes.length-1){setScene(cur+1); if(playing)play();} });
  document.getElementById('prev').addEventListener('click',function(){ ended=false; setScene(cur-1); if(playing)play(); });
  segs.forEach(function(s){ s.addEventListener('click',function(){ ended=false; setScene(+s.dataset.i); if(playing)play(); }); });
  document.addEventListener('keydown',function(e){ if(e.key==='ArrowRight'){ if(cur<scenes.length-1){setScene(cur+1); if(playing)play();} } if(e.key==='ArrowLeft'){ ended=false; setScene(cur-1); if(playing)play(); } if(e.key===' '){ e.preventDefault(); ended?play():(playing?pause():play()); } });
  setScene(0); play();
})();
</script>
</body>
</html>
