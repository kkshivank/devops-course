<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Version Control Basics | Module 3</title>
<style>
  :root{
    --bg:#0b0e20;--card:#1a2143;--ink:#eef1ff;--muted:#9aa3d0;
    --p1:#7c5cff;--p2:#00d4ff;--p3:#ff5da2;--p4:#ffb340;--p5:#28e0a8;
    --line:rgba(255,255,255,.09);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);
    color:var(--ink);overflow:hidden;display:flex;flex-direction:column;height:100vh;height:100dvh}
  .bg{position:fixed;inset:0;z-index:-2;background:
      radial-gradient(900px 500px at 12% -8%,rgba(124,92,255,.28),transparent),
      radial-gradient(800px 460px at 100% 0%,rgba(0,212,255,.22),transparent),
      radial-gradient(700px 500px at 50% 120%,rgba(255,93,162,.18),transparent),var(--bg)}
  .stars{position:fixed;inset:0;z-index:-1;overflow:hidden;opacity:.5}
  .stars i{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;animation:tw 4s ease-in-out infinite}
  svg .ic{stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}

  .top{display:flex;align-items:center;gap:12px;padding:16px 24px;flex-wrap:wrap}
  .chip{display:inline-flex;align-items:center;gap:8px;background:rgba(124,92,255,.16);
    border:1px solid rgba(124,92,255,.4);color:#c9bcff;padding:5px 14px;border-radius:100px;font-size:12px;font-weight:700;letter-spacing:1px}
  .chip svg{width:14px;height:14px}
  .top .t{font-size:15px;color:var(--muted);min-width:0}.top .t b{color:var(--ink)}

  .stage-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:6px 20px;min-height:0}
  .stage{position:relative;width:100%;max-width:900px;aspect-ratio:16/9;max-height:100%;
    background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(0,0,0,.12));
    border:1px solid var(--line);border-radius:20px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.5)}
  .scene{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:18px;opacity:0;transform:scale(1.03);pointer-events:none;transition:opacity .7s ease,transform .7s ease}
  .scene.active{opacity:1;transform:none;pointer-events:auto}
  .no-js .scene{position:relative;opacity:1;transform:none;border-bottom:1px solid var(--line)}
  .scene h2{font-size:clamp(20px,3vw,28px);margin-top:8px}
  .scene .art{width:100%;max-width:600px;flex:1;display:flex;align-items:center;justify-content:center}
  .scene .art svg{width:100%;height:100%;max-height:330px}

  .caption{display:flex;align-items:center;gap:12px;justify-content:center;padding:2px 24px 4px;min-height:56px}
  .navatar{width:38px;height:38px;flex-shrink:0}
  .navatar .eye{transform-box:fill-box;transform-origin:center;animation:blink 4s infinite}
  .ctext{background:rgba(0,0,0,.35);border:1px solid var(--line);border-radius:12px;padding:9px 16px;font-size:15px;max-width:760px;transition:opacity .35s ease}
  .ctext.swap{opacity:0}

  .controls{padding:8px 24px 18px;padding-bottom:max(18px,env(safe-area-inset-bottom))}
  .bar{max-width:900px;margin:0 auto}
  .timeline{display:flex;gap:5px;margin-bottom:12px}
  .seg{flex:1;height:6px;border-radius:5px;background:rgba(255,255,255,.12);overflow:hidden;cursor:pointer}
  .seg .fill{height:100%;width:0;background:linear-gradient(90deg,var(--p1),var(--p2))}
  .seg.done .fill{width:100%}
  .btns{display:flex;align-items:center;justify-content:center;gap:12px}
  button{font-family:inherit;cursor:pointer;border:1px solid var(--line);background:var(--card);color:var(--ink);
    border-radius:12px;padding:10px 15px;display:inline-flex;align-items:center;gap:8px;font-size:14px;font-weight:600;transition:background .2s ease,transform .1s ease}
  button:hover{background:#232a52}button:active{transform:scale(.95)}button svg{width:18px;height:18px}
  .play{background:linear-gradient(90deg,var(--p1),var(--p2));border:none;color:#08122a;padding:11px 22px}
  .lbl{min-width:150px;text-align:center;color:var(--muted);font-size:13px;font-weight:600}

  @keyframes tw{0%,100%{opacity:.15}50%{opacity:.9}}
  @keyframes blink{0%,92%,100%{transform:scaleY(1)}95%{transform:scaleY(.1)}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
  @keyframes pop{0%{opacity:0;transform:scale(.55)}70%{transform:scale(1.1)}100%{opacity:1;transform:scale(1)}}
  @keyframes slideR{from{opacity:0;transform:translateX(-80px)}to{opacity:1;transform:translateX(0)}}
  @keyframes slideL{from{opacity:0;transform:translateX(80px)}to{opacity:1;transform:translateX(0)}}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes glowp{0%,100%{opacity:.25;transform:scale(1)}50%{opacity:.55;transform:scale(1.12)}}
  @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  @keyframes draw{to{stroke-dashoffset:0}}
  @keyframes dash{to{stroke-dashoffset:-24}}

  .scene.active .u0{animation:fadeUp .7s .15s ease both}
  .scene.active .u1{animation:fadeUp .7s 1.1s ease both}
  .scene.active .bob{animation:bob 3s ease-in-out infinite}
  .scene.active .r0{animation:pop .5s .15s ease both}
  .scene.active .r1{animation:pop .5s .4s ease both}
  .scene.active .r2{animation:pop .5s .65s ease both}
  .scene.active .r3{animation:pop .5s .9s ease both}
  .scene.active .r4{animation:pop .5s 1.15s ease both}
  .scene.active .sL{animation:slideR .8s ease both}
  .scene.active .sR{animation:slideL .8s .15s ease both}
  .scene.active .tl{stroke-dasharray:360;stroke-dashoffset:360;animation:draw 2s .3s ease forwards}
  .conn{stroke-dasharray:4 5;animation:dash 1s linear infinite}
  .spin{transform-box:view-box;animation:spin 10s linear infinite}
  .glow{transform-origin:center;animation:glowp 2.6s ease-in-out infinite}

  @media(max-width:820px){
    body{height:auto;min-height:100dvh;overflow-x:hidden;overflow-y:auto}
    .stage-wrap{flex:none;padding:10px 14px}
    .stage{aspect-ratio:auto;height:auto;min-height:0;max-height:none}
    .scene{position:relative;inset:auto;display:none;transform:none;min-height:52vh}
    .scene.active{display:flex}.scene h2{font-size:20px}.scene .art svg{max-height:250px}
  }
  @media(max-width:640px){
    .top{padding:10px 14px;gap:8px}.top .t{font-size:13px}
    .stage-wrap{padding:4px 10px}.stage{border-radius:14px}
    .scene{padding:10px}.scene h2{font-size:18px}.scene .art svg{max-height:240px}
    .caption{padding:2px 12px;min-height:44px}.ctext{padding:8px 12px}
    .controls{padding:6px 12px 12px;padding-bottom:max(12px,env(safe-area-inset-bottom))}
    .btns{gap:8px}button{padding:9px 12px;font-size:13px}.play{padding:10px 16px}
    .lbl{display:none}.timeline{gap:3px}
  }
  @media(max-width:400px){.btns{gap:6px}button svg{width:16px;height:16px}.play span{display:none}.play{padding:10px 14px}}
</style>
</head>

<div class="bg"></div>
<div class="stars" id="stars"></div>

<div class="top">
  <span class="chip">
    <svg class="ic" viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
    MODULE 3 · 3.1
  </span>
  <div class="t"><b>Version Control Basics</b></div>
</div>

<div class="stage-wrap">
  <div class="stage" id="stage">

    <section class="scene active">
      <div class="art">
        <svg viewBox="0 0 480 260">

          <g class="bob" transform="translate(202,60)">
            <rect x="10" y="8" width="60" height="46" rx="16" fill="#6a4fee"/>
            <rect x="17" y="16" width="46" height="30" rx="11" fill="#0e1330"/>
            <circle class="eye" cx="30" cy="31" r="5" fill="#00d4ff"/><circle class="eye" cx="50" cy="31" r="5" fill="#00d4ff"/>

          </g>

          <g class="r1"><rect x="72" y="74" width="170" height="26" rx="6" fill="#1a2143" stroke="var(--line)"/><text x="86" y="91" font-size="12" fill="#eef1ff">report_final.doc</text></g>
          <g class="r2"><rect x="84" y="108" width="196" height="26" rx="6" fill="#1a2143" stroke="var(--line)"/><text x="98" y="125" font-size="12" fill="#eef1ff">report_final_v2.doc</text></g>
          <g class="r3"><rect x="96" y="142" width="220" height="26" rx="6" fill="#1a2143" stroke="#ff5da2"/><text x="110" y="159" font-size="12" fill="#ffb3d4">report_FINAL_final.doc</text></g>
          <g class="r4 bob" transform="translate(360,120)">

            <line x1="-8" y1="-6" x2="-3" y2="-3" stroke="#0e1330" stroke-width="2.4" stroke-linecap="round"/><line x1="8" y1="-6" x2="3" y2="-3" stroke="#0e1330" stroke-width="2.4" stroke-linecap="round"/>

          <text class="u1" x="240" y="206" text-anchor="middle" font-size="12" fill="#9aa3d0">Saving copies by hand gets messy fast — which one is the real final?</text>
        </svg>
      </div>
      <h2>The Problem</h2>
    </section>

    <section class="scene">
      <div class="art">
        <svg viewBox="0 0 480 240">
          <line class="tl" x1="50" y1="120" x2="410" y2="120" stroke="url(#g)" stroke-width="4" fill="none"/>
          <defs><linearGradient id="g" x1="0" x2="1"><stop offset="0" stop-color="#7c5cff"/><stop offset="1" stop-color="#00d4ff"/></linearGradient></defs>
          <g class="r0"><circle cx="70" cy="120" r="9" fill="#7c5cff"/><text x="70" y="150" text-anchor="middle" font-size="11" fill="#eef1ff">v1</text></g>
          <g class="r1"><circle cx="170" cy="120" r="9" fill="#00d4ff"/><text x="170" y="150" text-anchor="middle" font-size="11" fill="#eef1ff">v2</text></g>
          <g class="r2"><circle cx="270" cy="120" r="9" fill="#ffb340"/><text x="270" y="150" text-anchor="middle" font-size="11" fill="#eef1ff">v3</text></g>
          <g class="r3"><circle cx="370" cy="120" r="9" fill="#28e0a8"/><text x="370" y="150" text-anchor="middle" font-size="11" fill="#eef1ff">v4</text></g>

          <text class="u1" x="240" y="206" text-anchor="middle" font-size="12" fill="#9aa3d0">Version control records every change — and lets you return to any version</text>
        </svg>
      </div>
      <h2>What is Version Control?</h2>
    </section>

    <section class="scene">
      <div class="art">
        <svg viewBox="0 0 480 240">
          <g class="r0"><rect x="20" y="70" width="140" height="110" rx="14" fill="#1a2143" stroke="#7c5cff"/>
            <path class="ic" d="M78 108a22 22 0 1 1 6 15" stroke="#7c5cff"/><path class="ic" d="M82 92v10h-10" stroke="#7c5cff"/>
            <text x="90" y="150" text-anchor="middle" font-size="13" font-weight="700" fill="#eef1ff">Undo</text><text x="90" y="167" text-anchor="middle" font-size="11" fill="#9aa3d0">fix mistakes</text></g>
          <g class="r1"><rect x="170" y="70" width="140" height="110" rx="14" fill="#1a2143" stroke="#00d4ff"/>

            <text x="240" y="150" text-anchor="middle" font-size="13" font-weight="700" fill="#eef1ff">History</text><text x="240" y="167" text-anchor="middle" font-size="11" fill="#9aa3d0">who, what, when</text></g>
          <g class="r2"><rect x="320" y="70" width="140" height="110" rx="14" fill="#1a2143" stroke="#28e0a8"/>
            <circle class="ic" cx="378" cy="104" r="8" stroke="#28e0a8"/><path class="ic" d="M362 130a16 16 0 0 1 32 0" stroke="#28e0a8"/><circle class="ic" cx="402" cy="108" r="6" stroke="#28e0a8"/>
            <text x="390" y="150" text-anchor="middle" font-size="13" font-weight="700" fill="#eef1ff">Team work</text><text x="390" y="167" text-anchor="middle" font-size="11" fill="#9aa3d0">no overwriting</text></g>
        </svg>
      </div>
      <h2>Why Use It?</h2>
    </section>

    <section class="scene">
      <div class="art">
        <svg viewBox="0 0 480 240">
          <g class="sL"><rect x="30" y="55" width="180" height="130" rx="16" fill="#1a2143" stroke="#7c5cff"/>
            <rect x="98" y="85" width="44" height="34" rx="4" fill="none" stroke="#7c5cff" stroke-width="2"/><circle cx="110" cy="102" r="2.4" fill="#7c5cff"/><path d="M100 112h30" stroke="#7c5cff" stroke-width="2"/>
            <text x="120" y="150" text-anchor="middle" font-size="14" font-weight="800" fill="#c9bcff">Centralized</text><text x="120" y="168" text-anchor="middle" font-size="11" fill="#9aa3d0">one central server</text></g>

            <path d="M330 100 L390 100 L360 128 Z" stroke="#00d4ff" stroke-width="1.6" fill="none" opacity=".6"/>
            <text x="360" y="150" text-anchor="middle" font-size="14" font-weight="800" fill="#9fe8ff">Distributed</text><text x="360" y="168" text-anchor="middle" font-size="11" fill="#9aa3d0">everyone has a copy</text></g>
        </svg>
      </div>
      <h2>Two Types</h2>
    </section>

    <section class="scene">
      <div class="art">
        <svg viewBox="0 0 480 240">
          <g class="r0"><rect x="196" y="90" width="88" height="60" rx="10" fill="#1a2143" stroke="#7c5cff" stroke-width="2"/><path class="ic" d="M214 108h52M214 120h52M214 132h30" stroke="#7c5cff"/><text x="240" y="76" text-anchor="middle" font-size="11" font-weight="700" fill="#c9bcff">Central Server (SVN)</text></g>

          <text class="u1" x="240" y="212" text-anchor="middle" font-size="12" fill="#9aa3d0">Everyone connects to one server — if it goes down, work stops</text>

      </div>
      <h2>Centralized (SVN)</h2>
    </section>

    <section class="scene">

          <g class="r1"><circle cx="240" cy="80" r="20" fill="#12b6d8"/><circle cx="234" cy="78" r="2.6" fill="#0e1330"/><circle cx="246" cy="78" r="2.6" fill="#0e1330"/><path d="M232 86 q8 5 16 0" stroke="#0e1330" stroke-width="2" fill="none"/><rect x="218" y="106" width="44" height="20" rx="4" fill="none" stroke="#28e0a8" stroke-width="2"/><text x="240" y="120" text-anchor="middle" font-size="9" fill="#a3f5db">full copy</text></g>
          <g class="r2"><circle cx="380" cy="90" r="20" fill="#12b6d8"/><circle cx="374" cy="88" r="2.6" fill="#0e1330"/><circle cx="386" cy="88" r="2.6" fill="#0e1330"/><path d="M372 96 q8 5 16 0" stroke="#0e1330" stroke-width="2" fill="none"/><rect x="358" y="116" width="44" height="20" rx="4" fill="none" stroke="#28e0a8" stroke-width="2"/><text x="380" y="130" text-anchor="middle" font-size="9" fill="#a3f5db">full copy</text></g>

          <text class="u1" x="240" y="184" text-anchor="middle" font-size="12" fill="#9aa3d0">Each person has the whole project + history — you can even work offline</text>
        </svg>
      </div>
      <h2>Distributed (Git)</h2>
    </section>

    <section class="scene">
      <div class="art">
        <svg viewBox="0 0 480 240">
          <g class="sL">
            <rect x="18" y="20" width="210" height="204" rx="14" fill="#1a2143" stroke="#7c5cff"/>
            <text x="123" y="46" text-anchor="middle" font-size="15" font-weight="800" fill="#c9bcff">SVN</text>
            <text x="40" y="82" font-size="12" fill="#eef1ff">— Centralized</text>
            <text x="40" y="112" font-size="12" fill="#eef1ff">— One central server</text>
            <text x="40" y="142" font-size="12" fill="#eef1ff">— Needs connection</text>

            <text x="357" y="46" text-anchor="middle" font-size="15" font-weight="800" fill="#9fe8ff">Git</text>
            <text x="274" y="82" font-size="12" fill="#eef1ff">+ Distributed</text>
            <text x="274" y="112" font-size="12" fill="#eef1ff">+ Everyone has a copy</text>
            <text x="274" y="142" font-size="12" fill="#eef1ff">+ Works offline</text>
            <text x="274" y="172" font-size="12" fill="#eef1ff">+ Today's standard</text>
          </g>
        </svg>
      </div>
      <h2>SVN vs Git</h2>
    </section>

    <section class="scene">
      <div class="art">
        <svg viewBox="0 0 480 240">
          <g class="bob" transform="translate(214,14)">
            <rect x="10" y="8" width="48" height="38" rx="13" fill="#6a4fee"/><rect x="16" y="15" width="36" height="24" rx="9" fill="#0e1330"/>
            <circle cx="27" cy="27" r="4" fill="#00d4ff"/><circle cx="41" cy="27" r="4" fill="#00d4ff"/><path d="M28 34q6 5 12 0" stroke="#28e0a8" stroke-width="2.2" fill="none" stroke-linecap="round"/>
          </g>
          <g class="r0"><rect x="40" y="78" width="400" height="30" rx="8" fill="#1a2143" stroke="#7c5cff"/><text x="240" y="97" text-anchor="middle" font-size="12" fill="#eef1ff">Version control tracks every change and lets you go back</text></g>
          <g class="r1"><rect x="40" y="116" width="400" height="30" rx="8" fill="#1a2143" stroke="#00d4ff"/><text x="240" y="135" text-anchor="middle" font-size="12" fill="#eef1ff">Two types: Centralized (SVN) and Distributed (Git)</text></g>
          <g class="r2"><rect x="40" y="154" width="400" height="30" rx="8" fill="#1a2143" stroke="#28e0a8"/><text x="240" y="173" text-anchor="middle" font-size="12" fill="#eef1ff">Git is distributed, works offline — today's standard</text></g>
        </svg>
      </div>

    </section>

  </div>
</div>

<div class="caption">
  <svg class="navatar" viewBox="0 0 60 60">
    <rect x="14" y="16" width="32" height="26" rx="9" fill="#6a4fee"/><rect x="19" y="21" width="22" height="16" rx="6" fill="#0e1330"/>
    <circle class="eye" cx="26" cy="29" r="3" fill="#00d4ff"/><circle class="eye" cx="34" cy="29" r="3" fill="#00d4ff"/>
    <line x1="30" y1="16" x2="30" y2="10" stroke="#00d4ff" stroke-width="2.4" stroke-linecap="round"/><circle cx="30" cy="8" r="2.6" fill="#00d4ff"/>
  </svg>
  <div class="ctext" id="ctext">Version Control Basics — let's start with why we even need it.</div>
</div>

<div class="controls">
  <div class="bar">
    <div class="timeline" id="timeline"></div>
    <div class="btns">
      <button id="prev" aria-label="Previous"><svg class="ic" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></button>
      <button class="play" id="play"><svg class="ic" viewBox="0 0 24 24" id="playicon"><path d="M6 4h4v16H6zM14 4h4v16h-4z"/></svg><span id="playlabel">Pause</span></button>
      <button id="next" aria-label="Next"><svg class="ic" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg></button>
      <span class="lbl" id="chapterlabel">Intro</span>
    </div>
  </div>
</div>

<script>
document.body.classList.remove('no-js');
(function(){
  var sf=document.getElementById('stars'); var h='';
  for(var i=0;i<50;i++){h+='<i style="left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;animation-delay:'+(-Math.random()*4)+'s"></i>';}
  sf.innerHTML=h;
  var scenes=[].slice.call(document.querySelectorAll('.scene'));
  var names=['Intro','The problem','What is VCS','Why use it','Two types','Centralized (SVN)','Distributed (Git)','SVN vs Git','Recap'];
  var caps=[
    "Version Control Basics — let's start with why we even need it.",
    "Without version control, we keep saving copies — final, final_v2, FINAL_final — and quickly lose track.",
    "Version control records every change to your files — what changed, when, and by whom — so you can go back to any version.",
    "Why use it? You can undo mistakes, see the full history, and let a whole team work together without overwriting each other.",
    "There are two main types of version control: Centralized and Distributed.",
    "Centralized (like SVN): all the code lives on one central server. Everyone connects to it — if the server is down, work stops.",
    "Distributed (like Git): every person has a full copy of the project with its complete history — so you can even work offline.",
    "SVN is centralized and older; Git is distributed, faster and works offline — which is why most teams use Git today.",
    "That's the basics: version control tracks changes, and Git's distributed model is today's standard."
  ];
  var durations=[5000,9000,9000,9000,8000,10000,10000,10000,7000];
  var timeline=document.getElementById('timeline');
  scenes.forEach(function(_,i){ var d=document.createElement('div'); d.className='seg'; d.dataset.i=i; d.innerHTML='<div class="fill"></div>'; timeline.appendChild(d); });
  var segs=[].slice.call(document.querySelectorAll('.seg'));
  var cur=0, playing=true, start=0, raf=null, elapsed=0, ended=false;
  var playIcon=document.getElementById('playicon'), playLabel=document.getElementById('playlabel');
  var chapterLabel=document.getElementById('chapterlabel'), ctext=document.getElementById('ctext');
  var ICON_PAUSE='<path d="M6 4h4v16H6zM14 4h4v16h-4z"/>', ICON_PLAY='<path d="M6 4l14 8-14 8z"/>', ICON_REPLAY='<path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/>';
  function setScene(i){
    cur=Math.max(0,Math.min(scenes.length-1,i));
    scenes.forEach(function(s,idx){ s.classList.toggle('active',idx===cur); });
    segs.forEach(function(s,idx){ s.classList.toggle('done',idx<cur); s.querySelector('.fill').style.width= idx<cur?'100%':'0%'; });
    chapterLabel.textContent=names[cur];
    ctext.classList.add('swap');
    setTimeout(function(){ ctext.innerHTML=caps[cur]; ctext.classList.remove('swap'); },200);
    elapsed=0; start=performance.now();
  }
  function tick(now){ if(!playing) return; elapsed=now-start; var p=Math.min(elapsed/durations[cur],1);
    segs[cur].querySelector('.fill').style.width=(p*100)+'%';
    if(p>=1){ if(cur>=scenes.length-1){ finish(); return; } setScene(cur+1); } raf=requestAnimationFrame(tick); }
  function play(){ if(ended){ ended=false; setScene(0); } playing=true; playIcon.innerHTML=ICON_PAUSE; playLabel.textContent='Pause'; start=performance.now()-elapsed; cancelAnimationFrame(raf); raf=requestAnimationFrame(tick); }
  function pause(){ playing=false; playIcon.innerHTML=ICON_PLAY; playLabel.textContent='Play'; cancelAnimationFrame(raf); }
  function finish(){ playing=false; ended=true; playIcon.innerHTML=ICON_REPLAY; playLabel.textContent='Replay'; cancelAnimationFrame(raf); }
  document.getElementById('play').addEventListener('click',function(){ ended?play():(playing?pause():play()); });
  document.getElementById('next').addEventListener('click',function(){ if(cur<scenes.length-1){setScene(cur+1); if(playing)play();} });
  document.getElementById('prev').addEventListener('click',function(){ ended=false; setScene(cur-1); if(playing)play(); });
  segs.forEach(function(s){ s.addEventListener('click',function(){ ended=false; setScene(+s.dataset.i); if(playing)play(); }); });
  document.addEventListener('keydown',function(e){
    if(e.key==='ArrowRight'){ if(cur<scenes.length-1){setScene(cur+1); if(playing)play();} }
    if(e.key==='ArrowLeft'){ ended=false; setScene(cur-1); if(playing)play(); }
    if(e.key===' '){ e.preventDefault(); ended?play():(playing?pause():play()); }
  });
  setScene(0); play();
})();
</script>
</body>
