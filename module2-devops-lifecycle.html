<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Module 2 — DevOps &amp; Its Lifecycle</title>
<style>
  :root{
    --bg:#0b0e20;--panel:#151a35;--card:#1a2143;--ink:#eef1ff;--muted:#9aa3d0;
    --p1:#7c5cff;--p2:#00d4ff;--p3:#ff5da2;--p4:#ffb340;--p5:#28e0a8;--p6:#ff7a59;
    --line:rgba(255,255,255,.09);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);
    color:var(--ink);overflow:hidden;display:flex;flex-direction:column;height:100vh;height:100dvh}

  .bg{position:fixed;inset:0;z-index:-2;background:
      radial-gradient(900px 500px at 12% -8%,rgba(124,92,255,.28),transparent),
      radial-gradient(800px 460px at 100% 0%,rgba(0,212,255,.22),transparent),
      radial-gradient(700px 500px at 50% 120%,rgba(255,93,162,.18),transparent),var(--bg)}
  .stars{position:fixed;inset:0;z-index:-1;overflow:hidden;opacity:.5}
  .stars i{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;animation:tw 4s ease-in-out infinite}

  svg .ic{stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}

  .top{display:flex;align-items:center;gap:12px;padding:16px 24px;flex-wrap:wrap}
  .chip{display:inline-flex;align-items:center;gap:8px;background:rgba(124,92,255,.16);
    border:1px solid rgba(124,92,255,.4);color:#c9bcff;padding:5px 14px;border-radius:100px;
    font-size:12px;font-weight:700;letter-spacing:1px}
  .chip svg{width:14px;height:14px}
  .top .t{font-size:15px;color:var(--muted);min-width:0}
  .top .t b{color:var(--ink)}

  .stage-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:6px 20px;min-height:0}
  .stage{position:relative;width:100%;max-width:900px;aspect-ratio:16/9;max-height:100%;
    background:linear-gradient(180deg,rgba(255,255,255,.03),transparent);
    border:1px solid var(--line);border-radius:20px;overflow:hidden;
    box-shadow:0 30px 80px rgba(0,0,0,.5)}
  .scene{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:20px;opacity:0;transform:scale(1.03);pointer-events:none;
    transition:opacity .7s ease,transform .7s ease}
  .scene.active{opacity:1;transform:none;pointer-events:auto}
  .no-js .scene{position:relative;opacity:1;transform:none;border-bottom:1px solid var(--line)}
  .scene h2{font-size:clamp(20px,3vw,30px);margin-top:10px}
  .scene .art{width:100%;max-width:560px;flex:1;display:flex;align-items:center;justify-content:center}
  .scene .art svg{width:100%;height:100%;max-height:320px}

  .caption{display:flex;align-items:center;gap:12px;justify-content:center;padding:2px 24px 4px;min-height:56px}
  .navatar{width:38px;height:38px;flex-shrink:0}
  .navatar .eye{transform-box:fill-box;transform-origin:center;animation:blink 4s infinite}
  .ctext{background:rgba(0,0,0,.35);border:1px solid var(--line);border-radius:12px;padding:9px 16px;
    font-size:15px;max-width:720px;transition:opacity .35s ease}
  .ctext.swap{opacity:0}

  .controls{padding:8px 24px 18px;padding-bottom:max(18px,env(safe-area-inset-bottom))}
  .bar{max-width:900px;margin:0 auto}
  .timeline{display:flex;gap:5px;margin-bottom:12px}
  .seg{flex:1;height:6px;border-radius:5px;background:rgba(255,255,255,.12);overflow:hidden;cursor:pointer}
  .seg .fill{height:100%;width:0;background:linear-gradient(90deg,var(--p1),var(--p2))}
  .seg.done .fill{width:100%}
  .btns{display:flex;align-items:center;justify-content:center;gap:12px}
  button{font-family:inherit;cursor:pointer;border:1px solid var(--line);background:var(--card);color:var(--ink);
    border-radius:12px;padding:10px 15px;display:inline-flex;align-items:center;gap:8px;font-size:14px;font-weight:600;
    transition:background .2s ease,transform .1s ease}
  button:hover{background:#232a52}button:active{transform:scale(.95)}
  button svg{width:18px;height:18px}
  .play{background:linear-gradient(90deg,var(--p1),var(--p2));border:none;color:#08122a;padding:11px 22px}
  .lbl{min-width:150px;text-align:center;color:var(--muted);font-size:13px;font-weight:600}

  @keyframes tw{0%,100%{opacity:.15}50%{opacity:.9}}
  @keyframes blink{0%,92%,100%{transform:scaleY(1)}95%{transform:scaleY(.1)}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
  @keyframes pop{0%{opacity:0;transform:scale(.6)}70%{transform:scale(1.08)}100%{opacity:1;transform:scale(1)}}
  @keyframes slideR{from{opacity:0;transform:translateX(-90px)}to{opacity:1;transform:translateX(0)}}
  @keyframes slideL{from{opacity:0;transform:translateX(90px)}to{opacity:1;transform:translateX(0)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes grow{from{transform:scaleY(0)}to{transform:scaleY(1)}}
  @keyframes draw{to{stroke-dashoffset:0}}
  @keyframes glowp{0%,100%{opacity:.25;transform:scale(1)}50%{opacity:.55;transform:scale(1.12)}}
  @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  @keyframes typ{from{width:0}to{width:var(--w)}}
  @keyframes travel{to{offset-distance:100%}}

  .scene.active .ttl{animation:fadeUp .8s ease both}
  .scene.active .ttl2{animation:fadeUp .8s .2s ease both}
  .scene.active .tbot{animation:floaty 3.4s ease-in-out infinite}

  .scene.active .dev{animation:slideR 1.1s cubic-bezier(.2,.8,.2,1) both}
  .scene.active .ops{animation:slideL 1.1s cubic-bezier(.2,.8,.2,1) both}
  .scene.active .infl{animation:pop .7s 1s ease both}
  .scene.active .merglbl{animation:fadeUp .6s 1.3s ease both}

  .scene.active .bcard{animation:pop .6s ease both}
  .scene.active .bcard:nth-child(1){animation-delay:.1s}
  .scene.active .bcard:nth-child(2){animation-delay:.35s}
  .scene.active .bcard:nth-child(3){animation-delay:.6s}
  .scene.active .bcard:nth-child(4){animation-delay:.85s}

  #infPathLit{stroke-dasharray:920;stroke-dashoffset:920}
  .scene.active #infPathLit{animation:draw 2.6s ease forwards}
  #infDot{offset-path:path("M230,120 C180,60 60,60 60,120 C60,180 180,180 230,120 C280,60 400,60 400,120 C400,180 280,180 230,120 Z");offset-distance:0;animation:travel 6s linear infinite}
  .scene.active .lnode{animation:pop .5s ease both}
  .scene.active .lnode.n0{animation-delay:.3s}.scene.active .lnode.n1{animation-delay:.5s}
  .scene.active .lnode.n2{animation-delay:.7s}.scene.active .lnode.n3{animation-delay:.9s}
  .scene.active .lnode.n4{animation-delay:1.1s}.scene.active .lnode.n5{animation-delay:1.3s}
  .scene.active .lnode.n6{animation-delay:1.5s}.scene.active .lnode.n7{animation-delay:1.7s}
  .scene.active .lcenter{animation:fadeUp .6s 1.4s ease both}
  .scene.active .looplbl{animation:fadeUp .6s .2s ease both}

  .scene.active .rcore{animation:pop .6s .1s ease both}
  .scene.active .rrow{animation:slideL .5s ease both}
  .scene.active .rrow.r0{animation-delay:.3s}.scene.active .rrow.r1{animation-delay:.48s}
  .scene.active .rrow.r2{animation-delay:.66s}.scene.active .rrow.r3{animation-delay:.84s}
  .scene.active .rrow.r4{animation-delay:1.02s}.scene.active .rrow.r5{animation-delay:1.2s}

  .scene.active .job{animation:pop .5s ease both}
  .scene.active .job.j0{animation-delay:.15s}.scene.active .job.j1{animation-delay:.3s}
  .scene.active .job.j2{animation-delay:.45s}.scene.active .job.j3{animation-delay:.6s}
  .scene.active .job.j4{animation-delay:.75s}.scene.active .job.j5{animation-delay:.9s}

  #sprintLoop{transform-box:view-box;transform-origin:140px 118px;animation:spin 4.5s linear infinite}
  .scene.active .sprintcore{animation:fadeUp .6s .1s ease both}
  .scene.active .incr{transform-box:fill-box;transform-origin:bottom;animation:grow .5s ease both}
  .scene.active .incr.a0{animation-delay:.7s}.scene.active .incr.a1{animation-delay:1.05s}.scene.active .incr.a2{animation-delay:1.4s}
  .scene.active .sstep{animation:pop .45s ease both}
  .scene.active .sstep.s0{animation-delay:.4s}.scene.active .sstep.s1{animation-delay:.6s}
  .scene.active .sstep.s2{animation-delay:.8s}.scene.active .sstep.s3{animation-delay:1s}

  .scene.active .colA{animation:slideR .8s ease both}
  .scene.active .colB{animation:slideL .8s .15s ease both}
  #agileLoop{transform-box:view-box;transform-origin:110px 120px;animation:spin 4s linear infinite}
  .scene.active .pipefill{stroke-dasharray:220;stroke-dashoffset:220;animation:draw 2.2s .6s ease forwards}

  .scene.active .codeline{width:0;animation:typ .5s ease both}
  .scene.active .codeline.l0{animation-delay:.2s}.scene.active .codeline.l1{animation-delay:.5s}
  .scene.active .codeline.l2{animation-delay:.8s}.scene.active .codeline.l3{animation-delay:1.1s}
  .scene.active .iarrow{animation:pop .5s 1.4s ease both}
  .scene.active .srv{animation:pop .5s ease both}
  .scene.active .srv.s0{animation-delay:1.6s}.scene.active .srv.s1{animation-delay:1.85s}
  .scene.active .srv.s2{animation-delay:2.1s}

  .scene.active .rc{animation:pop .45s ease both}
  .scene.active .rc:nth-child(1){animation-delay:.1s}.scene.active .rc:nth-child(2){animation-delay:.25s}
  .scene.active .rc:nth-child(3){animation-delay:.4s}.scene.active .rc:nth-child(4){animation-delay:.55s}
  .scene.active .rc:nth-child(5){animation-delay:.7s}.scene.active .rc:nth-child(6){animation-delay:.85s}
  .scene.active .rc:nth-child(7){animation-delay:1s}
  .scene.active .celebrate{animation:floaty 2.6s ease-in-out infinite}

  .glow{transform-origin:center;animation:glowp 2.6s ease-in-out infinite}

  @media(max-width:820px){
    body{height:auto;min-height:100dvh;overflow-x:hidden;overflow-y:auto}
    .stage-wrap{flex:none;padding:10px 14px}
    .stage{aspect-ratio:auto;height:auto;min-height:0;max-height:none}
    .scene{position:relative;inset:auto;display:none;transform:none;min-height:52vh}
    .scene.active{display:flex}
    .scene h2{font-size:21px}
    .scene .art svg{max-height:240px}
  }
  @media(max-width:640px){
    .top{padding:10px 14px;gap:8px}
    .top .t{font-size:13px}
    .stage-wrap{padding:4px 10px}
    .stage{border-radius:14px}
    .scene{padding:12px}
    .scene h2{font-size:18px;margin-top:6px}
    .scene .art svg{max-height:230px}
    .caption{padding:2px 12px;min-height:44px}
    .ctext{padding:8px 12px}
    .controls{padding:6px 12px 12px;padding-bottom:max(12px,env(safe-area-inset-bottom))}
    .btns{gap:8px}
    button{padding:9px 12px;font-size:13px}
    .play{padding:10px 16px}
    .lbl{display:none}
    .timeline{gap:3px}
  }
  @media(max-width:400px){
    .btns{gap:6px}
    button svg{width:16px;height:16px}
    .play span{display:none}
    .play{padding:10px 14px}
  }
  @media(max-height:480px) and (orientation:landscape){
    .top{padding:6px 16px}
    .caption{min-height:38px;padding:0 16px}
    .controls{padding:4px 16px 8px}
    .scene .art svg{max-height:200px}
  }
</style>
</head>
<body class="no-js">
<div class="bg"></div>
<div class="stars" id="stars"></div>

<div class="top">
  <span class="chip">
    <svg class="ic" viewBox="0 0 24 24"><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/></svg>
    MODULE 2
  </span>
  <div class="t"><b>DevOps &amp; Its Lifecycle</b></div>
</div>

<div class="stage-wrap">
  <div class="stage" id="stage">

    <section class="scene active">
      <div class="art">
        <svg viewBox="0 0 480 260">
          <circle class="glow" cx="240" cy="120" r="70" fill="#7c5cff" opacity=".3"/>
          <g class="tbot" transform="translate(200,60)">
            <rect x="10" y="8" width="60" height="46" rx="16" fill="#6a4fee"/>
            <rect x="17" y="16" width="46" height="30" rx="11" fill="#0e1330"/>
            <circle class="eye" cx="30" cy="31" r="5" fill="#00d4ff"/><circle class="eye" cx="50" cy="31" r="5" fill="#00d4ff"/>
            <path d="M32 39q8 6 16 0" stroke="#28e0a8" stroke-width="2.6" fill="none" stroke-linecap="round"/>
            <line x1="40" y1="8" x2="40" y2="0" stroke="#00d4ff" stroke-width="3" stroke-linecap="round"/>
            <circle cx="40" cy="-3" r="4" fill="#00d4ff" class="glow"/>
          </g>
          <text class="ttl" x="240" y="170" text-anchor="middle" font-size="30" font-weight="800" fill="#eef1ff">DevOps &amp; Its Lifecycle</text>
          <text class="ttl2" x="240" y="200" text-anchor="middle" font-size="15" fill="#9aa3d0">The mindset and the never-ending loop</text>
        </svg>
      </div>
      <h2 style="opacity:0"></h2>
    </section>

    <section class="scene">
      <div class="art">
        <svg viewBox="0 0 480 240">
          <g class="dev">
            <circle cx="150" cy="120" r="58" fill="rgba(124,92,255,.15)" stroke="#7c5cff" stroke-width="2"/>
            <text x="150" y="115" text-anchor="middle" font-size="18" font-weight="800" fill="#c9bcff">Dev</text>
            <text x="150" y="135" text-anchor="middle" font-size="11" fill="#9aa3d0">writes code</text>
          </g>
          <g class="ops">
            <circle cx="330" cy="120" r="58" fill="rgba(0,212,255,.13)" stroke="#00d4ff" stroke-width="2"/>
            <text x="330" y="115" text-anchor="middle" font-size="18" font-weight="800" fill="#9fe8ff">Ops</text>
            <text x="330" y="135" text-anchor="middle" font-size="11" fill="#9aa3d0">runs servers</text>
          </g>
          <g class="infl">
            <path d="M205 120 C220 95 260 95 240 120 C220 145 260 145 275 120" fill="none" stroke="#28e0a8" stroke-width="4" stroke-linecap="round"/>
          </g>
          <text class="merglbl" x="240" y="210" text-anchor="middle" font-size="16" font-weight="700" fill="#a3f5db">= DevOps: one team, one flow</text>
        </svg>
      </div>
      <h2>DevOps Introduction</h2>
    </section>

    <section class="scene">
      <div class="art">
        <svg viewBox="0 0 520 240">
          <g class="bcard"><rect x="10" y="60" width="115" height="120" rx="14" fill="#1a2143" stroke="var(--line)"/>
            <path class="ic" d="M67 95a25 25 0 1 0 1 0z" stroke="#7c5cff"/><path class="ic" d="M67 118l14-10" stroke="#7c5cff"/>
            <text x="67" y="152" text-anchor="middle" font-size="12" font-weight="700" fill="#eef1ff">Faster</text>
            <text x="67" y="168" text-anchor="middle" font-size="11" fill="#9aa3d0">delivery</text></g>
          <g class="bcard"><rect x="135" y="60" width="115" height="120" rx="14" fill="#1a2143" stroke="var(--line)"/>
            <path class="ic" d="M192 88l20 8v14c0 13-9 20-20 24c-11-4-20-11-20-24V96z" stroke="#00d4ff"/>
            <path class="ic" d="M185 112l5 5 10-11" stroke="#00d4ff"/>
            <text x="192" y="152" text-anchor="middle" font-size="12" font-weight="700" fill="#eef1ff">Reliable</text>
            <text x="192" y="168" text-anchor="middle" font-size="11" fill="#9aa3d0">releases</text></g>
          <g class="bcard"><rect x="260" y="60" width="115" height="120" rx="14" fill="#1a2143" stroke="var(--line)"/>
            <circle class="ic" cx="305" cy="98" r="9" stroke="#ff5da2"/><path class="ic" d="M288 122a17 17 0 0 1 34 0" stroke="#ff5da2"/>
            <text x="317" y="152" text-anchor="middle" font-size="12" font-weight="700" fill="#eef1ff">Team</text>
            <text x="317" y="168" text-anchor="middle" font-size="11" fill="#9aa3d0">collaboration</text></g>
          <g class="bcard"><rect x="385" y="60" width="115" height="120" rx="14" fill="#1a2143" stroke="var(--line)"/>
            <path class="ic" d="M420 108a22 22 0 1 1 6 15" stroke="#28e0a8"/><path class="ic" d="M424 92v10h-10" stroke="#28e0a8"/>
            <text x="442" y="152" text-anchor="middle" font-size="12" font-weight="700" fill="#eef1ff">Quick</text>
            <text x="442" y="168" text-anchor="middle" font-size="11" fill="#9aa3d0">recovery</text></g>
        </svg>
      </div>
      <h2>Goals &amp; Benefits</h2>
    </section>

    <section class="scene">
      <div class="art">
        <svg viewBox="0 0 460 250">
          <defs><linearGradient id="infg" x1="0" x2="1"><stop offset="0" stop-color="#7c5cff"/><stop offset=".5" stop-color="#00d4ff"/><stop offset="1" stop-color="#28e0a8"/></linearGradient></defs>
          <path d="M230,120 C180,60 60,60 60,120 C60,180 180,180 230,120 C280,60 400,60 400,120 C400,180 280,180 230,120 Z" fill="none" stroke="rgba(255,255,255,.1)" stroke-width="6"/>
          <path id="infPathLit" d="M230,120 C180,60 60,60 60,120 C60,180 180,180 230,120 C280,60 400,60 400,120 C400,180 280,180 230,120 Z" fill="none" stroke="url(#infg)" stroke-width="5" stroke-linecap="round"/>
          <text class="looplbl" x="120" y="40" text-anchor="middle" font-size="13" font-weight="800" letter-spacing="1" fill="#c9bcff">DEV</text>
          <text class="looplbl" x="340" y="40" text-anchor="middle" font-size="13" font-weight="800" letter-spacing="1" fill="#9fe8ff">OPS</text>
          <circle id="infDot" cx="0" cy="0" r="7" fill="#ffffff"/>
          <g class="lnode n0"><circle cx="120" cy="74" r="6" fill="#7c5cff"/><text x="120" y="62" text-anchor="middle" font-size="10" fill="#eef1ff">Plan</text></g>
          <g class="lnode n1"><circle cx="60" cy="120" r="6" fill="#7c5cff"/><text x="38" y="124" text-anchor="middle" font-size="10" fill="#eef1ff">Code</text></g>
          <g class="lnode n2"><circle cx="120" cy="166" r="6" fill="#00d4ff"/><text x="120" y="186" text-anchor="middle" font-size="10" fill="#eef1ff">Build</text></g>
          <g class="lnode n3"><circle cx="192" cy="150" r="6" fill="#00d4ff"/><text x="180" y="168" text-anchor="middle" font-size="10" fill="#eef1ff">Test</text></g>
          <g class="lnode n4"><circle cx="268" cy="150" r="6" fill="#ffb340"/><text x="282" y="168" text-anchor="middle" font-size="10" fill="#eef1ff">Release</text></g>
          <g class="lnode n5"><circle cx="340" cy="166" r="6" fill="#ffb340"/><text x="340" y="186" text-anchor="middle" font-size="10" fill="#eef1ff">Deploy</text></g>
          <g class="lnode n6"><circle cx="400" cy="120" r="6" fill="#28e0a8"/><text x="422" y="124" text-anchor="middle" font-size="10" fill="#eef1ff">Operate</text></g>
          <g class="lnode n7"><circle cx="340" cy="74" r="6" fill="#28e0a8"/><text x="340" y="62" text-anchor="middle" font-size="10" fill="#eef1ff">Monitor</text></g>
          <text class="lcenter" x="230" y="232" text-anchor="middle" font-size="12" fill="#9aa3d0">The &#8734; symbol = a never-ending cycle</text>
        </svg>
      </div>
      <h2>The DevOps Lifecycle &amp; the &#8734; Symbol</h2>
    </section>

    <section class="scene">
      <div class="art">
        <svg viewBox="0 0 480 240">
          <g class="rcore">
            <circle cx="78" cy="116" r="46" fill="rgba(124,92,255,.16)" stroke="#7c5cff" stroke-width="2"/>
            <circle cx="78" cy="104" r="12" fill="none" stroke="#eef1ff" stroke-width="2.4"/>
            <path d="M56 142a22 22 0 0 1 44 0" fill="none" stroke="#eef1ff" stroke-width="2.4"/>
            <text x="78" y="188" text-anchor="middle" font-size="12" font-weight="800" fill="#c9bcff">DevOps</text>
            <text x="78" y="203" text-anchor="middle" font-size="12" font-weight="800" fill="#c9bcff">Engineer</text>
          </g>
          <g class="rrow r0"><rect x="168" y="20" width="300" height="28" rx="8" fill="#1a2143" stroke="var(--line)"/><circle cx="184" cy="34" r="4" fill="#7c5cff"/><text x="200" y="38" font-size="12" fill="#eef1ff">Connect the Dev and Ops teams</text></g>
          <g class="rrow r1"><rect x="168" y="54" width="300" height="28" rx="8" fill="#1a2143" stroke="var(--line)"/><circle cx="184" cy="68" r="4" fill="#00d4ff"/><text x="200" y="72" font-size="12" fill="#eef1ff">Build &amp; manage CI/CD pipelines</text></g>

<script>
document.body.classList.remove('no-js');
(function(){
  var sf=document.getElementById('stars'); var h='';
  for(var i=0;i<50;i++){h+='<i style="left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;animation-delay:'+(-Math.random()*4)+'s"></i>';}
  sf.innerHTML=h;

  var scenes=[].slice.call(document.querySelectorAll('.scene'));
  var names=['Intro','What is DevOps','Goals & Benefits','Lifecycle','Roles','Job Profiles','Principles','What is Agile','Agile vs DevOps','Infra as Code','Recap'];
  var caps=[
    "DevOps & Its Lifecycle — let's begin.",
    "DevOps unites Development and Operations into one continuous way of working.",
    "The goal: ship software faster and more reliably, with quick recovery when things break.",
    "The DevOps symbol is an infinity loop — work never stops. Left loop is Dev (Plan, Code, Build, Test); right loop is Ops (Release, Deploy, Operate, Monitor).",
    "A DevOps Engineer is the bridge between Dev and Ops. They build CI/CD pipelines, automate builds, tests and deployments, manage servers and cloud, and monitor everything — so releases stay fast and reliable.",
    "DevOps opens many career paths — DevOps Engineer, SRE, Cloud, Release, Platform and Automation Engineer roles.",
    "Four principles hold it together: Collaboration, Automation, Continuous Improvement, Monitoring.",
    "Agile builds software in short repeating sprints — deliver a small working version, get feedback, improve, and repeat.",
    "Agile speeds up how teams build in sprints; DevOps extends that speed all the way to release, deploy and operations.",
    "Instead of setting up servers by hand, you describe them in a config file — like a recipe. Run it once, and identical servers are built automatically, every time.",
    "That's Module 2 — the mindset and lifecycle behind everything you'll build next."
  ];
  var durations=[5000,8500,9000,12000,9000,10000,10000,9500,10000,10500,7000];

  var timeline=document.getElementById('timeline');
  scenes.forEach(function(_,i){ var d=document.createElement('div'); d.className='seg'; d.dataset.i=i;
    d.innerHTML='<div class="fill"></div>'; timeline.appendChild(d); });
  var segs=[].slice.call(document.querySelectorAll('.seg'));

  var cur=0, playing=true, start=0, raf=null, elapsed=0, ended=false;
  var playIcon=document.getElementById('playicon'), playLabel=document.getElementById('playlabel');
  var chapterLabel=document.getElementById('chapterlabel'), ctext=document.getElementById('ctext');
  var ICON_PAUSE='<path d="M6 4h4v16H6zM14 4h4v16h-4z"/>', ICON_PLAY='<path d="M6 4l14 8-14 8z"/>', ICON_REPLAY='<path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/>';

  function setScene(i){
    cur=Math.max(0,Math.min(scenes.length-1,i));
    scenes.forEach(function(s,idx){ s.classList.toggle('active',idx===cur); });
    segs.forEach(function(s,idx){ s.classList.toggle('done',idx<cur);
      s.querySelector('.fill').style.width= idx<cur?'100%':'0%'; });
    chapterLabel.textContent=names[cur];
    ctext.classList.add('swap');
    setTimeout(function(){ ctext.innerHTML=caps[cur]; ctext.classList.remove('swap'); },200);
    elapsed=0; start=performance.now();
  }
  function tick(now){
    if(!playing) return;
    elapsed=now-start;
    var p=Math.min(elapsed/durations[cur],1);
    segs[cur].querySelector('.fill').style.width=(p*100)+'%';
    if(p>=1){
      if(cur>=scenes.length-1){ finish(); return; }
      setScene(cur+1);
    }
    raf=requestAnimationFrame(tick);
  }
  function play(){ if(ended){ ended=false; setScene(0); }
    playing=true; playIcon.innerHTML=ICON_PAUSE; playLabel.textContent='Pause';
    start=performance.now()-elapsed; cancelAnimationFrame(raf); raf=requestAnimationFrame(tick); }
  function pause(){ playing=false; playIcon.innerHTML=ICON_PLAY; playLabel.textContent='Play'; cancelAnimationFrame(raf); }
  function finish(){ playing=false; ended=true; playIcon.innerHTML=ICON_REPLAY; playLabel.textContent='Replay'; cancelAnimationFrame(raf); }

  document.getElementById('play').addEventListener('click',function(){ ended?play():(playing?pause():play()); });
  document.getElementById('next').addEventListener('click',function(){ if(cur<scenes.length-1){setScene(cur+1); if(playing)play();} });
  document.getElementById('prev').addEventListener('click',function(){ ended=false; setScene(cur-1); if(playing)play(); });
  segs.forEach(function(s){ s.addEventListener('click',function(){ ended=false; setScene(+s.dataset.i); if(playing)play(); }); });
  document.addEventListener('keydown',function(e){
    if(e.key==='ArrowRight'){ if(cur<scenes.length-1){setScene(cur+1); if(playing)play();} }
    if(e.key==='ArrowLeft'){ ended=false; setScene(cur-1); if(playing)play(); }
    if(e.key===' '){ e.preventDefault(); ended?play():(playing?pause():play()); }
  });

  setScene(0); play();
})();
</script>
